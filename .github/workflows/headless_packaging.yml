name: Build FUXA Headless (Latest)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: x64
          - os: macos-latest
            arch: arm64
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install build dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -y build-essential unixodbc unixodbc-dev

    - name: Install server dependencies
      run: npm install
      working-directory: ./server

    - name: Install client dependencies
      run: npm install
      working-directory: ./client

    - name: Build client
      run: npm run build -- --configuration=production
      working-directory: ./client

    - name: Setup Headless Package Directory
      run: |
        mkdir -p fuxa-headless/server
        mkdir -p fuxa-headless/client/dist
        cp -r server/. fuxa-headless/server/
        cp -r client/dist/. fuxa-headless/client/dist/
        cp -r _reports fuxa-headless/
        cp app/headless/headless-entry.js fuxa-headless/main.js
      shell: bash

    - name: Install pkg
      run: npm install -g pkg

    - name: Create Package Config
      run: |
        cat > fuxa-headless/package.json <<EOF
        {
          "name": "fuxa-headless",
          "version": "1.3.0",
          "bin": "main.js",
          "pkg": {
            "assets": [
              "server/**/*",
              "client/dist/**/*",
              "_reports/**/*"
            ]
          }
        }
        EOF
      shell: bash

    - name: Build Standalone Binaries (Headless)
      run: |
        pkg fuxa-headless/package.json --targets node18-linux-x64,node18-win-x64,node18-macos-x64 --out-path fuxa-headless/bin
      working-directory: .

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        if [ "${{ matrix.os }}" = "windows-latest" ] && [ "${{ matrix.arch }}" = "x64" ]; then
          mv fuxa-headless/bin/fuxa-headless-win-x64.exe artifacts/FUXA-headless-windows-x64.exe || true
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ] && [ "${{ matrix.arch }}" = "x64" ]; then
          mv fuxa-headless/bin/fuxa-headless-linux-x64 artifacts/FUXA-headless-linux-x64 || true
        elif [ "${{ matrix.os }}" = "ubuntu-24.04-arm" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
          mv fuxa-headless/bin/fuxa-headless-linux-arm64 artifacts/FUXA-headless-linux-arm64 || true
        elif [ "${{ matrix.os }}" = "macos-latest" ] && [ "${{ matrix.arch }}" = "x64" ]; then
          mv fuxa-headless/bin/fuxa-headless-macos-x64 artifacts/FUXA-headless-macos-x64 || true
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          mv fuxa-headless/bin/fuxa-headless-macos-arm64 artifacts/FUXA-headless-macos-arm64 || true
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FUXA-headless-${{ matrix.os }}-${{ matrix.arch }}
        path: headless/artifacts/*
